# Netlify build configuration for the Cyberpunk Artist Portfolio (standalone)
#
# If using Netlify Drop (drag-and-drop): drop the unzipped folder and this
# config will be auto-detected. Build command runs and `dist/` is published.
#
# If connecting via Git, settings are auto-detected from this file.
# You can also set them manually in the Netlify dashboard:
#   Base directory:    (leave empty)
#   Build command:     npm install && npm run build
#   Publish directory: dist

[build]
  base = ""
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Decap CMS admin must be served as a static page (handled before SPA fallback)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

# SPA fallback so client-side routing works on every route
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Decap CMS admin should never be cached aggressively
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"
    X-Frame-Options = "SAMEORIGIN"

# Netlify Identity widget passthrough
[[redirects]]
  from = "/.netlify/identity"
  to = "/.netlify/identity"
  status = 200
  force = true
